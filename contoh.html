<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifikasi Push Masjid Ar-Rahman</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f7f7f7;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .container {
      background-color: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      padding: 30px;
      max-width: 400px;
      text-align: center;
    }
    h1 {
      color: #2c3e50;
      margin-bottom: 15px;
    }
    p {
      color: #34495e;
      font-size: 16px;
      margin-bottom: 25px;
    }
    a.button {
      display: inline-block;
      padding: 12px 25px;
      background-color: #3498db;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      transition: background-color 0.3s;
    }
    a.button:hover {
      background-color: #2980b9;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Info Anggota Masjid Ar-Rahman</h1>
    <p>Ada perubahan data anggota baru! Periksa sekarang untuk memastikan informasi terbaru. 🕌</p>
    <a class="button" href="http://bit.ly/abc" target="_blank">Lihat Detail</a>
  </div>
</body>
</html>
